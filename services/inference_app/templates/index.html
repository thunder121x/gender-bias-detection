<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gender Bias Detection - Text Classification</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>Gender Bias Detection</h1>
                <p class="subtitle">Text Classification using MiniLM Model</p>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Input Section -->
            <section class="input-section">
                <div class="form-group">
                    <label for="textInput">Enter text to analyze:</label>
                    <textarea 
                        id="textInput" 
                        class="text-input" 
                        placeholder="Paste or type text here..." 
                        rows="8"
                    ></textarea>
                    <div class="input-info">
                        <span class="char-count">Characters: <span id="charCount">0</span></span>
                    </div>
                </div>

                <div class="button-group">
                    <button id="analyzeBtn" class="btn btn-primary">Analyze Text</button>
                    <button id="clearBtn" class="btn btn-secondary">Clear</button>
                </div>
            </section>

            <!-- Loading Indicator -->
            <div id="loadingIndicator" class="loading hidden">
                <div class="spinner"></div>
                <p>Analyzing text...</p>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="error-message hidden"></div>

            <!-- Results Section -->
            <section id="resultsSection" class="results-section hidden">
                <!-- Primary Prediction -->
                <div class="prediction-box">
                    <h2>Classification Result</h2>
                    <div class="primary-result">
                        <div class="result-label-container">
                            <span class="result-label" id="predictedLabel">-</span>
                            <span class="confidence-badge" id="confidenceBadge">-</span>
                        </div>
                        <p class="result-description" id="resultDescription">-</p>
                    </div>
                </div>

                <!-- Confidence Scores -->
                <div class="scores-box">
                    <h3>Confidence Scores for All Categories</h3>
                    <div class="scores-grid" id="scoresGrid">
                        <!-- Generated dynamically -->
                    </div>
                </div>

                <!-- Input Text Display -->
                <div class="input-display-box">
                    <h3>Analyzed Text</h3>
                    <div class="input-text-display" id="inputTextDisplay">-</div>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Gender Bias Detection System | Powered by MiniLM Transformer</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
