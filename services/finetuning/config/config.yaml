# Token Classification Fine-tuning Configuration

# Data augmentation settings
data:
  input_dir: "services/synthesizer_v2/output/label"
  output_dir: "services/finetuning/data"
  
  # Paragraph generation settings
  paragraph:
    min_sentences: 4
    max_sentences: 8
    
    # Bias distribution in generated paragraphs
    distribution:
      no_bias_ratio: 0.40          # 40% paragraphs with no bias
      one_bias_ratio: 0.40         # 40% with 1 biased sentence
      two_bias_ratio: 0.15         # 15% with 2 biased sentences
      three_plus_bias_ratio: 0.05  # 5% with 3+ biased sentences
  
  # Training/test split
  train_test_split: 0.8
  validation_split: 0.1

# Model settings
model:
  base_model: "xlm-roberta-base"  # Thai-compatible multilingual model
  # Alternative options:
  # - "bert-base-multilingual-cased" (slower but good)
  # - "xlm-roberta-large" (more powerful, higher memory)
  
  max_length: 512
  device: "cuda"  # "cuda" or "cpu"

# Training settings
training:
  num_epochs: 3
  batch_size: 16
  learning_rate: 2e-5
  warmup_steps: 500
  weight_decay: 0.01
  
  # Gradient settings
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  
  # Saving
  save_dir: "services/finetuning/models"
  save_strategy: "epoch"
  save_total_limit: 3
  
  # Logging
  log_dir: "services/finetuning/logs"
  logging_steps: 100

# Evaluation settings
evaluation:
  metrics:
    - precision
    - recall
    - f1
  confidence_threshold: 0.5  # Threshold for positive predictions

# Token classification settings
token_classification:
  labels:
    - "O"      # Outside (no bias)
    - "B-BIAS" # Begin bias span
    - "I-BIAS" # Inside bias span
  
  # BIO tag mapping (for tokenization)
  id2label:
    0: "O"
    1: "B-BIAS"
    2: "I-BIAS"
  
  label2id:
    "O": 0
    "B-BIAS": 1
    "I-BIAS": 2

# Inference settings
inference:
  confidence_threshold: 0.5
  span_merging: true  # Merge adjacent B-BIAS/I-BIAS tokens
